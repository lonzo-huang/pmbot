<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Polymarket LLM Prediction Trading Bot - AI-powered market analysis and automated trading" />
    <meta name="theme-color" content="#000000" />
    <meta name="msapplication-TileColor" content="#000000" />
    
    <!-- ✅ 修复后的 Security Headers - 添加所有 RPC 节点 -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      connect-src 'self'
        https://polygon-rpc.com
        https://polygon-bor.publicnode.com
        https://1rpc.io/matic
        https://rpc.ankr.com/polygon
        https://*.alchemy.com
        https://gamma-api.polymarket.com
        https://clob.polymarket.com
        https://data-api.polymarket.com
        https://*.openrouter.ai
        wss://ws.polymarket.com
        wss://*.polymarket.com;
      img-src 'self' https: data:;
      font-src 'self' https://fonts.gstatic.com data:;
      frame-ancestors 'none';
    " />

    <!-- Preconnect to APIs -->
    <link rel="preconnect" href="https://gamma-api.polymarket.com" />
    <link rel="preconnect" href="https://clob.polymarket.com" />
    <link rel="preconnect" href="https://data-api.polymarket.com" />
    <link rel="preconnect" href="https://openrouter.ai" />
    <link rel="preconnect" href="https://polygon-rpc.com" />
    <link rel="preconnect" href="https://polygon-bor.publicnode.com" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <title>Polymarket LLM Bot</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Loading Screen -->
    <div id="loading-screen" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'JetBrains Mono', monospace;
      color: #00ff00;
    ">
      <div style="font-size: 24px; margin-bottom: 20px; text-shadow: 0 0 10px #00ff00;">
        POLYMARKET LLM BOT
      </div>
      <div style="width: 200px; height: 2px; background: #003300; border-radius: 1px;">
        <div id="loading-bar" style="
          width: 0%;
          height: 100%;
          background: #00ff00;
          box-shadow: 0 0 10px #00ff00;
          transition: width 0.3s ease;
        "></div>
      </div>
      <div id="loading-text" style="margin-top: 10px; font-size: 12px; opacity: 0.7;">
        Initializing...
      </div>
    </div>
    
    <script>
      const loadingBar = document.getElementById('loading-bar');
      const loadingText = document.getElementById('loading-text');
      const loadingScreen = document.getElementById('loading-screen');
      
      let progress = 0;
      const stages = [
        'Loading core modules...',
        'Initializing wallet service...',
        'Connecting to APIs...',
        'Loading strategies...',
        'Ready!'
      ];
      
      const interval = setInterval(() => {
        progress += Math.random() * 20;
        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
          setTimeout(() => {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
              loadingScreen.style.display = 'none';
            }, 500);
          }, 500);
        }
        loadingBar.style.width = progress + '%';
        loadingText.textContent = stages[Math.min(Math.floor(progress / 20), stages.length - 1)];
      }, 200);
    </script>
  </body>
</html>
